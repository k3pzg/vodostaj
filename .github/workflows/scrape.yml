name: Scrape vodostaj i protok

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          attempt=1
          max_attempts=3

          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Scraper attempt $attempt/$max_attempts"
            if python scraper.py; then
              echo "Scraper succeeded on attempt $attempt"
              exit 0
            fi

            echo "Scraper failed on attempt $attempt"

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Waiting 60 seconds before retry..."
              sleep 60
            fi

            attempt=$((attempt + 1))
          done

          echo "Scraper failed after $max_attempts attempts"
          exit 1

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vodostaj_protok.csv
          git diff --cached --quiet || git commit -m "Update vodostaj_protok.csv"
          git push
